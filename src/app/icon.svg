<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Left Bar Gradient (Cyan/Blue) -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2997FF" />
      <stop offset="100%" stop-color="#0033CC" />
    </linearGradient>

    <!-- Mid-Left Bar Gradient (Blue) -->
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5E5CE6" />
      <stop offset="100%" stop-color="#2525A0" />
    </linearGradient>

    <!-- Mid-Right Bar Gradient (Purple) -->
    <linearGradient id="grad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#BF5AF2" />
      <stop offset="100%" stop-color="#5E25A0" />
    </linearGradient>

    <!-- Right Bar Gradient (Pink/Magenta) -->
    <linearGradient id="grad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E040FB" />
      <stop offset="100%" stop-color="#7C15FF" />
    </linearGradient>

    <!-- Horizontal Bar Gradient (Left to Right) -->
    <linearGradient id="gradH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2997FF" />
      <stop offset="100%" stop-color="#E040FB" />
    </linearGradient>
  </defs>

  <!-- Transparent Background for Favicon -->
  <rect width="100" height="100" fill="transparent" />

  <!-- The 4 Vertical Bars -->
  <!-- Bar 1 (Left) -->
  <rect x="20" y="15" width="10" height="70" rx="5" fill="url(#grad1)" />
  
  <!-- Bar 2 (Mid-Left) -->
  <rect x="38" y="25" width="10" height="50" rx="5" fill="url(#grad2)" />
  
  <!-- Bar 3 (Mid-Right) -->
  <rect x="56" y="25" width="10" height="50" rx="5" fill="url(#grad3)" />
  
  <!-- Bar 4 (Right) -->
  <rect x="74" y="15" width="10" height="70" rx="5" fill="url(#grad4)" />

  <!-- The Horizontal Bar -->
  <rect x="20" y="45" width="64" height="10" rx="5" fill="url(#gradH)" />
</svg>
